<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canlı TV</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#2e2e41;
  color:white;
  overflow-x:hidden;
}

/* Üst bar */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#1f1f33;
  position:fixed;
  top:0;
  width:100%;
  z-index:10;
  box-sizing:border-box;
}

/* Logo */
.logo a{
  display:inline-block;
  outline:none;
  transition:0.2s;
}
.logo a:hover, .logo a:focus{
  transform: scale(1.05);
}
.logo img{
  height:50px;
  cursor:pointer;
  display:block;
}

/* Menü kartları */
nav{
  display:flex;
  gap:20px;
}

.card{
  width:160px;
  height:50px;
  background:#3b3b55;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  transition:0.2s;
}
.card:focus{
  outline:3px solid white;
  transform:scale(1.05);
  background:#4a4a6a;
}

/* İçerik alanı */
.content{
  margin-top:100px;
  padding:30px;
}

/* Canlı TV logoları */
.channels{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  margin-top:30px;
}

.channel{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  outline:none;
  transition:0.2s;
}
.channel img{
  width:100px;
  height:100px;
  object-fit:contain;
  border-radius:12px;
  margin-bottom:5px;
  background:#3b3b55;
  padding:10px;
}
.channel span{
  font-size:16px;
  text-align:center;
}

/* Seçili kanal */
.channel:focus{
  box-shadow:0 0 0 4px #00bfff;
  transform:scale(1.05);
}

/* Video player alanı */
#playerContainer{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-top:50px;
}
#player{
  width:90%;
  max-width:1280px;
  height:720px;
  background:black;
}
#backButton{
  margin-top:10px;
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3b3b55;
  color:white;
  transition:0.2s;
}
#backButton:focus{
  outline:3px solid white;
  transform:scale(1.05);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html" tabindex="1">
      <img src="https://drive.google.com/thumbnail?id=1YeHbwiM1L3wMeDArJE-IcuNoQSm11awo&sz=w1000" alt="BluTV Logo">
    </a>
  </div>

  <nav>
    <a class="card" href="index.html" tabindex="2">Filmler</a>
    <a class="card" href="#" tabindex="3">Diziler</a>
    <a class="card" href="#" tabindex="4">Canlı TV</a>
  </nav>
</header>

<div class="content">
  <div class="row-title">Canlı TV Kanalları</div>

  <div class="channels">
    <a href="#" class="channel" data-src="https://tv-trt1.medya.trt.com.tr/master_1080.m3u8" tabindex="5">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/TRT1_logo.png" alt="TRT 1">
      <span>TRT 1</span>
    </a>

    <a href="#" class="channel" data-src="https://demiroren.daioncdn.net/kanald/kanald.m3u8?app=kanald_web&ce=3" tabindex="6">
      <img src="https://static.wikia.nocookie.net/kurtlar-vadisi/images/c/ca/Kanal_D_logo.svg/revision/latest/thumbnail/width/360/height/360?cb=20240501101427&path-prefix=tr" alt="Kanal D">
      <span>Kanal D</span>
    </a>
  </div>

  <!-- Video player -->
  <div id="playerContainer">
    <video id="player" controls autoplay></video>
    <button id="backButton" tabindex="7">Kanallara Dön</button>
  </div>
</div>

<script>
const logoLink = document.querySelector(".logo a");
const menuCards = document.querySelectorAll("nav .card");
const channels = document.querySelectorAll(".channel");
const playerContainer = document.getElementById("playerContainer");
const player = document.getElementById("player");
const backButton = document.getElementById("backButton");

// Başlangıç focus logo
logoLink.focus();

// Yön tuşu navigasyonu
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"){
    if(document.activeElement===logoLink) menuCards[0].focus();
    else if(document.activeElement.classList.contains("card")) {
      const idx = Array.from(menuCards).indexOf(document.activeElement);
      if(idx+1<menuCards.length) menuCards[idx+1].focus();
      else channels[0].focus();
    } else if(document.activeElement.classList.contains("channel")) {
      const idx = Array.from(channels).indexOf(document.activeElement);
      if(idx+1<channels.length) channels[idx+1].focus();
    }
  }
  if(e.key==="ArrowLeft"){
    if(document.activeElement.classList.contains("card")) {
      const idx = Array.from(menuCards).indexOf(document.activeElement);
      if(idx>0) menuCards[idx-1].focus();
      else logoLink.focus();
    } else if(document.activeElement.classList.contains("channel")) {
      const idx = Array.from(channels).indexOf(document.activeElement);
      if(idx>0) channels[idx-1].focus();
      else menuCards[menuCards.length-1].focus();
    }
  }
  if(e.key==="ArrowDown"){
    if(document.activeElement===logoLink || document.activeElement.classList.contains("card")){
      channels[0].focus();
    }
  }
  if(e.key==="ArrowUp"){
    if(document.activeElement.classList.contains("channel")){
      menuCards[menuCards.length-1].focus();
    }
  }
});

// Kanal seçildiğinde video aç
channels.forEach(channel => {
  channel.addEventListener("click", () => {
    const src = channel.getAttribute("data-src");
    player.src = src;
    playerContainer.style.display = "flex";
    document.querySelector(".channels").style.display = "none";
    player.focus();

    // Tam ekran aç
    if (player.requestFullscreen) player.requestFullscreen();
    else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
    else if (player.msRequestFullscreen) player.msRequestFullscreen();
  });
});

// Geri butonu
backButton.addEventListener("click", () => {
  // Fullscreen kapat
  if (document.fullscreenElement) document.exitFullscreen();
  else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
  else if (document.msFullscreenElement) document.msExitFullscreen();

  player.pause();
  player.src = "";
  playerContainer.style.display = "none";
  document.querySelector(".channels").style.display = "flex";
  channels[0].focus();
});
</script>

</body>
</html>
