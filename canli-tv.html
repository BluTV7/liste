<!DOCTYPE html>

<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canlı TV</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#2e2e41;
color:white;
overflow-x:hidden;
}

/* Üst bar */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#1f1f33;
position:fixed;
top:0;
width:100%;
z-index:10;
box-sizing:border-box;
}

.logo img{
height:50px;
}

/* Menü */

nav{
display:flex;
gap:20px;
}

.card{
width:160px;
height:50px;
background:#3b3b55;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
text-decoration:none;
color:white;
}

.card:focus{
outline:3px solid white;
}

/* İçerik */

.content{
margin-top:110px;
padding:30px;
}

.row-title{
font-size:28px;
margin-bottom:20px;
}

/* Kanal grid */

.channels{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:40px;
}

.channel{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
outline:none;
}

.channel img{
width:130px;
height:130px;
object-fit:contain;
border-radius:12px;
background:#3b3b55;
padding:10px;
}

.channel:focus{
box-shadow:0 0 0 4px white;
border-radius:16px;
transform:scale(1.05);
}

/* Player */

#playerContainer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:1000;
}

#player{
width:100%;
height:100%;
background:black;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="https://drive.google.com/thumbnail?id=1YeHbwiM1L3wMeDArJE-IcuNoQSm11awo&sz=w1000">
</div>

<nav>
<a class="card" href="#">Filmler</a>
<a class="card" href="#">Diziler</a>
<a class="card" href="#">Canlı TV</a>
</nav>

</header>

<div class="content" id="channelList">

<div class="row-title">Canlı TV</div>

<div class="channels" id="channels"></div>

</div>

<div id="playerContainer">
<video id="player" controls autoplay></video>
</div>

<script src="channel-list.js"></script>

<script>

const container=document.getElementById("channels");
const player=document.getElementById("player");
const playerContainer=document.getElementById("playerContainer");
const channelList=document.getElementById("channelList");

let channels;
let currentChannelIndex=0;


/* Kanal listesini oluştur */

channelData.forEach((ch,index)=>{

const a=document.createElement("a");
a.href="#";
a.className="channel";
a.dataset.stream=ch.stream;
a.tabIndex=index+5;

const img=document.createElement("img");
img.src=ch.logo;

a.appendChild(img);
container.appendChild(a);

});


channels=document.querySelectorAll(".channel");


/* Kanal aç */

channels.forEach((channel,index)=>{

channel.addEventListener("click",(e)=>{

e.preventDefault();

currentChannelIndex=index;

playChannel(index);

});

});


function playChannel(index){

const stream=channels[index].dataset.stream;

player.src=stream;

channelList.style.display="none";

playerContainer.style.display="block";

player.play();

}


/* Kumanda kontrol */

document.addEventListener("keydown",(e)=>{

if(playerContainer.style.display==="block"){

if(e.key==="Escape" || e.key==="Backspace"){

player.pause();

playerContainer.style.display="none";

channelList.style.display="block";

channels[currentChannelIndex].focus();

}

if(e.key==="ArrowDown"){

currentChannelIndex=(currentChannelIndex+1)%channels.length;

playChannel(currentChannelIndex);

}

if(e.key==="ArrowUp"){

currentChannelIndex=(currentChannelIndex-1+channels.length)%channels.length;

playChannel(currentChannelIndex);

}

}

});

</script>

</body>
</html>
