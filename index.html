<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluTV Ana Sayfa</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#2e2e41;
  color:white;
  overflow-x:hidden;
}

/* Üst bar */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#1f1f33;
  position:fixed;
  top:0;
  width:100%;
  z-index:10;
  box-sizing:border-box;
}

/* Logo */
.logo a{
  display:inline-block;
  outline:none;
  transition:0.2s;
}
.logo a:hover, .logo a:focus{
  transform:scale(1.05);
}
.logo img{
  height:50px;
  cursor:pointer;
  display:block;
}

/* Menü kartları */
nav{
  display:flex;
  gap:20px;
}

.card{
  width:160px;
  height:50px;
  background:#3b3b55;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  transition:0.2s;
}
.card:focus{
  outline:3px solid white;
  transform:scale(1.05);
  background:#4a4a6a;
}

/* İçerik alanı */
.content{
  margin-top:100px;
  padding:30px;
}

/* Satır başlığı */
.row-title{
  font-size:22px;
  margin-bottom:15px;
  padding-left:5px;
}

/* Poster satırı */
.row{
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding-top:10px;
  padding-bottom:20px;
}

/* Scrollbar */
.row::-webkit-scrollbar{
  height:10px;
}
.row::-webkit-scrollbar-thumb{
  background:#555;
  border-radius:5px;
}
.row::-webkit-scrollbar-track{
  background:#2e2e41;
}

/* Poster / Item */
.item{
  min-width:180px;
  height:280px;
  background:#3b3b55;
  border-radius:12px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
  overflow:hidden;
  flex-shrink:0;
  position:relative;
  filter: brightness(0.6);
  text-decoration: none;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

/* Film adı overlay */
.item span{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background: rgba(0,0,0,0.7);
  color:white;
  text-align:center;
  padding:4px 0;
  font-size:14px;
  font-weight:bold;
  opacity:0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition:0.2s;
}

/* Seçili poster */
.item:focus{
  outline: none;
  box-shadow: inset 0 0 0 4px #00bfff;
  transform:scale(1.03);
  filter: brightness(1);
  z-index: 2;
}
.item:focus span{
  opacity:1;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html" tabindex="1">
      <img src="https://drive.google.com/thumbnail?id=1YeHbwiM1L3wMeDArJE-IcuNoQSm11awo&sz=w1000" alt="BluTV Logo">
    </a>
  </div>

  <nav>
    <a class="card" href="#" tabindex="2">Filmler</a>
    <a class="card" href="#" tabindex="3">Diziler</a>
    <a class="card" href="canli-tv.html" tabindex="4">Canlı TV</a>
  </nav>
</header>

<div class="content">

<div class="row-title">Öne Çıkan Türk Filmleri</div>

<div class="row">
  <a href="https://jetfilmizle.net/film/paranormal-cuma" target="_blank" class="item" tabindex="5">
    <img src="https://jetfilmizle.net/uploads/films/2024/p/paranormal-cuma-poster-large.webp">
    <span>Paranormal Cuma</span>
  </a>

  <a href="https://jetfilmizle.net/film/cmxxiv" target="_blank" class="item" tabindex="6">
    <img src="https://jetfilmizle.net/uploads/films/2025/c/cmxxiv-poster-large.webp">
    <span>CMXXIV</span>
  </a>

  <a href="https://jetfilmizle.net/film/hep-yek-loto" target="_blank" class="item" tabindex="7">
    <img src="https://jetfilmizle.net/uploads/films/2025/h/hep-yek-loto-poster-large.webp">
    <span>Hep Yek Loto</span>
  </a>

  <a href="https://www.hdfilmcehennemi.nl/sijjin-8/" target="_blank" class="item" tabindex="8">
    <img src="https://www.hdfilmcehennemi.nl/images/list/poster/sijjin-8@2x.webp">
    <span>Siccîn 8</span>
  </a>

  <a href="https://jetfilmizle.net/film/sag-salim-3-olu-ya-da-diri" target="_blank" class="item" tabindex="9">
    <img src="https://jetfilmizle.net/uploads/films/2023/s/sag-salim-3-olu-ya-da-diri-poster-small.webp">
    <span>Sağ Salim 3: Ölü ya da Diri</span>
  </a>
</div>

</div>

<script>
// Menü ve logo navigasyonu
const logoLink = document.querySelector(".logo a");
const menuCards = document.querySelectorAll("nav .card");
const items = document.querySelectorAll(".item");

logoLink.focus();

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"){
    if(document.activeElement===logoLink) menuCards[0].focus();
    else if(document.activeElement.classList.contains("card")) {
      const idx = Array.from(menuCards).indexOf(document.activeElement);
      if(idx+1<menuCards.length) menuCards[idx+1].focus();
      else items[0].focus();
    } else if(document.activeElement.classList.contains("item")) {
      const idx = Array.from(items).indexOf(document.activeElement);
      if(idx+1<items.length) items[idx+1].focus();
    }
  }
  if(e.key==="ArrowLeft"){
    if(document.activeElement.classList.contains("card")) {
      const idx = Array.from(menuCards).indexOf(document.activeElement);
      if(idx>0) menuCards[idx-1].focus();
      else logoLink.focus();
    } else if(document.activeElement.classList.contains("item")) {
      const idx = Array.from(items).indexOf(document.activeElement);
      if(idx>0) items[idx-1].focus();
      else menuCards[menuCards.length-1].focus();
    }
  }
  if(e.key==="ArrowDown"){
    if(document.activeElement===logoLink || document.activeElement.classList.contains("card")){
      items[0].focus();
    }
  }
  if(e.key==="ArrowUp" && document.activeElement.classList.contains("item")){
    logoLink.focus();
  }
});
</script>

</body>
</html>
