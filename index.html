<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<title>BluTV</title>
<link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1kvyAX1JNiORV24_BRiGXNdB7Bp14BBFG&sz=w1000">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #2e2e41;
    color: white;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: #1f1f33;
}

header .logo img {
    height: 35px; /* küçültüldü */
}

header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
    transition: color 0.3s;
}

header nav a:hover {
    color: #00bfff;
}

/* Ana içerik */
.main-content {
    text-align: center;
    margin-top: 100px;
}

.main-content img {
    width: 200px;
    margin-bottom: 20px;
}

.main-content h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.main-content p {
    font-size: 24px;
    color: #cccccc;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="https://drive.google.com/thumbnail?id=1YeHbwiM1L3wMeDArJE-IcuNoQSm11awo&sz=w1000" alt="BluTV Logo">
        </a>
    </div>
    <nav>
        <a href="#">Filmler</a>
        <a href="#">Diziler</a>
        <a href="#">Canlı TV</a>
    </nav>
</header>

<div class="main-content">
    <img src="https://drive.google.com/thumbnail?id=1YeHbwiM1L3wMeDArJE-IcuNoQSm11awo&sz=w1000" alt="BluTV Logo">
    <h1>BluTV</h1>
    <p>Türkiye'nin yeni TV platformu</p>
</div>

</body>
</html>
